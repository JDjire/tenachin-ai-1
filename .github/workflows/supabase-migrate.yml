name: Deploy Supabase migrations

on:
  push:
    branches: [ master ]

jobs:
  supabase_migrations:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        run: |
          curl -sL https://deb.nodesource.com/setup_18.x | sudo -E bash -
          sudo apt-get update && sudo apt-get install -y nodejs build-essential
          npm install -g supabase

      - name: Run migrations (requires SUPABASE_URL and SUPABASE_SERVICE_ROLE_KEY secrets)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          # Authenticate the CLI using the service role key
          supabase login --service-role $SUPABASE_SERVICE_ROLE_KEY || true
          # Push migrations from the repo (adjust folder if needed)
          supabase db push --project-ref $SUPABASE_URL || echo "Supabase db push exited with non-zero status"
